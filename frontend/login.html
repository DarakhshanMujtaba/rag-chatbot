<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — RAG Chatbot</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c8fff'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Cpath d='M18 24a6 6 0 0 1 6-6h16a6 6 0 0 1 6 6v10a6 6 0 0 1-6 6H28l-8 6v-6a6 6 0 0 1-2-4.7V24z' fill='white' fill-opacity='.95'/%3E%3Ccircle cx='26' cy='28' r='2.2' fill='%237c8fff'/%3E%3Ccircle cx='32' cy='28' r='2.2' fill='%237c8fff'/%3E%3Ccircle cx='38' cy='28' r='2.2' fill='%237c8fff'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css" />
<link rel="stylesheet" href="/static/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-shell">
    <div class="auth-brand">
      <div class="brand-icon" aria-hidden="true">✨</div>
      <div class="brand-text">
        <h2>RAG Chatbot</h2>
        <p class="chat-subtitle">Answers grounded strictly in your uploaded documents.</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-mode="login">Log in</button>
        <button type="button" class="auth-tab" data-mode="signup">Sign up</button>
      </div>

      <form id="authForm" class="auth-form">
        <label class="auth-label" for="email">Email</label>
        <input class="auth-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />

        <label class="auth-label" for="password">Password</label>
        <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="8" />

        <button type="submit" id="authSubmit" class="btn-primary auth-submit">
          <span id="authSubmitLabel">Log in</span>
        </button>

        <p id="authError" class="auth-error hidden"></p>
      </form>
    </div>
  </div>

  <script src="/static/auth.js"></script>
</body>
</html>
